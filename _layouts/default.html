<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
    {% include head.html %}
    <body class="site{% if site.animated %} animated fade-in-down{% endif %}">
        {% if site.google_tag_manager %}
        <noscript
            ><iframe
                src="https://www.googletagmanager.com/ns.html?id={{ site.google_tag_manager }}"
                height="0"
                width="0"
                style="display: none; visibility: hidden"
            ></iframe
        ></noscript>
        {% endif %} {% if site.facebook_comments %}
        <div id="fb-root"></div>
        <script>
            (function (d, s, id) {
                var js,
                    fjs = d.getElementsByTagName(s)[0];
                if (d.getElementById(id)) return;
                js = d.createElement(s);
                js.id = id;
                js.src =
                    "//connect.facebook.net/en_US/sdk.js#xfbml=1&version=v2.5&appId={{ site.facebook_appid }}";
                fjs.parentNode.insertBefore(js, fjs);
            })(document, "script", "facebook-jssdk");
        </script>
        {% endif %}

        <div class="site-wrap">
            {% include header.html %}

            <div class="post p2 p-responsive wrap" role="main">
                <div class="measure">{{ content }}</div>
            </div>
        </div>

        {% include footer.html %}

        <script>
            (function () {
                const toggleBtn = document.getElementById("theme-toggle");
                const iconContainer =
                    document.getElementById("theme-toggle-icon");
                if (!toggleBtn || !iconContainer) return;

                const themes = ["system", "light", "dark"];
                const icons = {
                    system: "💻",
                    light: "☀️",
                    dark: "🌙",
                };

                function getTheme() {
                    return localStorage.getItem("theme") || "system";
                }

                function setTheme(theme) {
                    if (theme === "system") {
                        document.documentElement.removeAttribute("data-theme");
                    } else {
                        document.documentElement.setAttribute(
                            "data-theme",
                            theme,
                        );
                    }
                    localStorage.setItem("theme", theme);
                    updateIcon(theme);
                }

                function updateIcon(theme) {
                    iconContainer.textContent = icons[theme];
                    toggleBtn.setAttribute(
                        "aria-label",
                        `Toggle theme (current: ${theme})`,
                    );
                }

                toggleBtn.addEventListener("click", () => {
                    const currentTheme = getTheme();
                    const nextTheme =
                        themes[
                            (themes.indexOf(currentTheme) + 1) % themes.length
                        ];
                    setTheme(nextTheme);
                });

                // Init icon
                updateIcon(getTheme());
            })();
        </script>

        <style>
            #theme-toggle {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 1rem;
                padding: 0;
                vertical-align: middle;
                color: var(--nav-link-color);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-left: 10px;
            }
            #theme-toggle:hover {
                color: var(--link-color);
            }
            @media (min-width: 320px) and (max-width: 1199px) {
                #theme-toggle {
                    font-size: 0.8rem;
                }
            }
        </style>
    </body>
</html>
